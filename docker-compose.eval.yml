# docker-compose.eval.yml — local eval daemons for LongMemEval runner.
# Usage: docker compose -f docker-compose.eval.yml up -d --wait
# Ports: qdrant :6333, ollama :11434
# Volumes: ./.eval-data/{qdrant,ollama} (gitignored)

services:
  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.eval-data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  ollama:
    image: ollama/ollama:0.5.4
    ports:
      - "11434:11434"
    volumes:
      - ./.eval-data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
