<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="240" fill="url(#bg)"/>
  <text x="600" y="32" text-anchor="middle" font-size="13" fill="#64748b" font-weight="600" letter-spacing="2">BUILT ON PRIOR ART</text>

  <!-- MemGPT 2023 -->
  <g transform="translate(60,70)">
    <rect width="220" height="120" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600">2023 · UC BERKELEY</text>
    <text x="110" y="60" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">MemGPT</text>
    <text x="110" y="84" text-anchor="middle" font-size="11" fill="#475569">First paper on</text>
    <text x="110" y="100" text-anchor="middle" font-size="11" fill="#475569">persistent agent memory</text>
  </g>
  <line x1="285" y1="130" x2="320" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Letta -->
  <g transform="translate(330,70)">
    <rect width="220" height="120" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600">2024 · OSS + VC</text>
    <text x="110" y="60" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Letta</text>
    <text x="110" y="84" text-anchor="middle" font-size="11" fill="#475569">Production memory</text>
    <text x="110" y="100" text-anchor="middle" font-size="11" fill="#475569">runtime for agents</text>
  </g>
  <line x1="555" y1="130" x2="590" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- mem0 -->
  <g transform="translate(600,70)">
    <rect width="220" height="120" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600">2024 · OSS (30k+ ★)</text>
    <text x="110" y="60" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">mem0</text>
    <text x="110" y="84" text-anchor="middle" font-size="11" fill="#475569">Popular Python</text>
    <text x="110" y="100" text-anchor="middle" font-size="11" fill="#475569">memory layer SDK</text>
  </g>
  <line x1="825" y1="130" x2="860" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Amore -->
  <g transform="translate(870,60)">
    <rect width="270" height="140" rx="14" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
    <text x="135" y="28" text-anchor="middle" font-size="11" fill="#bfdbfe" font-weight="600">2026 · LOCAL-FIRST · RUST</text>
    <text x="135" y="68" text-anchor="middle" font-size="28" font-weight="700" fill="white">Amore</text>
    <text x="135" y="94" text-anchor="middle" font-size="12" fill="#dbeafe">Per-user · Zero cloud</text>
    <text x="135" y="112" text-anchor="middle" font-size="12" fill="#dbeafe">5-channel install · Auto-wire</text>
    <text x="135" y="128" text-anchor="middle" font-size="12" fill="#dbeafe">Sigstore-signed binaries</text>
  </g>

  <text x="600" y="222" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">MemGPT (arXiv:2310.08560) · Letta (letta.com) · mem0 (mem0.ai) — adapted to local-first, zero-backend, single-binary distribution.</text>
</svg>
