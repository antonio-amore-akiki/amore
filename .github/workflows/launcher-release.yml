# Launcher release — builds Tauri 2 amore-launcher for Windows, macOS, Linux.
# SmartScreen / Gatekeeper click-through documented like amore main release
# (no paid signing cert required; cosign keyless OIDC provides build attestation).
# Trigger: gh workflow run launcher-release.yml -f version=1.1.0 -f release_tag=launcher-v1.1.0

name: launcher-release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.1.0)'
        required: true
        type: string
      release_tag:
        description: 'GH Release tag to upload to (e.g. launcher-v1.1.0) — created if absent'
        required: true
        type: string

permissions: read-all

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  windows-launcher:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write   # cosign keyless OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node (required by Tauri CLI)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Cache cargo registry + target
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-launcher-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app (Windows)
        working-directory: crates/amore-launcher/src-tauri
        run: cargo tauri build
        # Produces target/release/bundle/msi/*.msi + target/release/bundle/nsis/*.exe

      - name: Locate artifacts + compute SHA
        id: artifacts
        shell: powershell
        run: |
          $base = "target/release/bundle"
          $exe = Get-ChildItem -Path "$base/nsis/*.exe", "$base/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 2
          if (-not $exe) { throw "Tauri build produced no installer artifacts" }
          $names = @()
          foreach ($f in $exe) {
            $sha = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            $dest = "amore-launcher-${{ inputs.version }}-win-x64$($f.Extension)"
            Copy-Item $f.FullName $dest
            Write-Host "$dest sha256=$sha"
            $names += $dest
          }
          echo "artifacts=$($names -join ' ')" >> $env:GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@9614fae9e5c5eddabb09f90a270fcb487c9f7149 # v3.3.0

      - name: Cosign sign Windows artifacts
        shell: powershell
        run: |
          foreach ($f in "${{ steps.artifacts.outputs.artifacts }}" -split ' ') {
            if ($f) { cosign sign-blob --yes --bundle "$f.sigstore" "$f" }
          }

      - name: Create release if absent + upload
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          gh release view "${{ inputs.release_tag }}" 2>$null || `
            gh release create "${{ inputs.release_tag }}" --title "Amore Launcher ${{ inputs.version }}" --notes "Amore desktop launcher v${{ inputs.version }}" --draft
          foreach ($f in "${{ steps.artifacts.outputs.artifacts }}" -split ' ') {
            if ($f) { gh release upload "${{ inputs.release_tag }}" "$f" "$f.sigstore" --clobber }
          }

  # ──────────────────────────────────────────────────────────────────────────────
  macos-launcher:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install webkitgtk (macOS webkit is native; brew install for build deps only)
        run: brew install --quiet create-dmg || true

      - name: Cache cargo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-launcher-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app (macOS ${{ matrix.target }})
        working-directory: crates/amore-launcher/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Package + SHA
        id: pkg
        run: |
          set -euo pipefail
          ARCH=$(echo "${{ matrix.target }}" | cut -d- -f1)
          # Tauri produces a .dmg and .app bundle
          DMG=$(find target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          APP=$(find target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          DEST_DMG="amore-launcher-${{ inputs.version }}-macos-${ARCH}.dmg"
          if [ -n "$DMG" ]; then
            cp "$DMG" "$DEST_DMG"
          elif [ -n "$APP" ]; then
            # Fallback: wrap .app into dmg via hdiutil
            hdiutil create -volname "Amore Launcher" -srcfolder "$APP" -ov -format UDZO "$DEST_DMG"
          else
            echo "::error::No .dmg or .app found in bundle output"
            exit 1
          fi
          SHA=$(shasum -a 256 "$DEST_DMG" | cut -d' ' -f1)
          echo "dmg=$DEST_DMG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@9614fae9e5c5eddabb09f90a270fcb487c9f7149 # v3.3.0

      - name: Cosign sign macOS DMG
        run: cosign sign-blob --yes --bundle "${{ steps.pkg.outputs.dmg }}.sigstore" "${{ steps.pkg.outputs.dmg }}"

      - name: Create release if absent + upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ inputs.release_tag }}" 2>/dev/null || \
            gh release create "${{ inputs.release_tag }}" --title "Amore Launcher ${{ inputs.version }}" --notes "Amore desktop launcher v${{ inputs.version }}" --draft
          gh release upload "${{ inputs.release_tag }}" "${{ steps.pkg.outputs.dmg }}" "${{ steps.pkg.outputs.dmg }}.sigstore" --clobber

  # ──────────────────────────────────────────────────────────────────────────────
  linux-launcher:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install Tauri Linux deps (webkit2gtk 4.1 required by Tauri 2)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config file curl \
            libxdo-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Cache cargo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-launcher-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app (Linux)
        working-directory: crates/amore-launcher/src-tauri
        run: cargo tauri build

      - name: Locate AppImage + deb
        id: artifacts
        run: |
          set -euo pipefail
          APPIMAGE=$(find target/release/bundle/appimage -name "*.AppImage" 2>/dev/null | head -1)
          DEB=$(find target/release/bundle/deb -name "*.deb" 2>/dev/null | head -1)
          DEST_AI="amore-launcher-${{ inputs.version }}-linux-x64.AppImage"
          DEST_DEB="amore-launcher-${{ inputs.version }}-linux-x64.deb"
          [ -n "$APPIMAGE" ] && cp "$APPIMAGE" "$DEST_AI" && SHA_AI=$(sha256sum "$DEST_AI" | cut -d' ' -f1) && echo "appimage=$DEST_AI" >> $GITHUB_OUTPUT && echo "sha_ai=$SHA_AI" >> $GITHUB_OUTPUT
          [ -n "$DEB" ] && cp "$DEB" "$DEST_DEB" && SHA_DEB=$(sha256sum "$DEST_DEB" | cut -d' ' -f1) && echo "deb=$DEST_DEB" >> $GITHUB_OUTPUT && echo "sha_deb=$SHA_DEB" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@9614fae9e5c5eddabb09f90a270fcb487c9f7149 # v3.3.0

      - name: Cosign sign Linux artifacts
        run: |
          [ -n "${{ steps.artifacts.outputs.appimage }}" ] && \
            cosign sign-blob --yes --bundle "${{ steps.artifacts.outputs.appimage }}.sigstore" "${{ steps.artifacts.outputs.appimage }}" || true
          [ -n "${{ steps.artifacts.outputs.deb }}" ] && \
            cosign sign-blob --yes --bundle "${{ steps.artifacts.outputs.deb }}.sigstore" "${{ steps.artifacts.outputs.deb }}" || true

      - name: Create release if absent + upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ inputs.release_tag }}" 2>/dev/null || \
            gh release create "${{ inputs.release_tag }}" --title "Amore Launcher ${{ inputs.version }}" --notes "Amore desktop launcher v${{ inputs.version }}" --draft
          [ -n "${{ steps.artifacts.outputs.appimage }}" ] && \
            gh release upload "${{ inputs.release_tag }}" "${{ steps.artifacts.outputs.appimage }}" "${{ steps.artifacts.outputs.appimage }}.sigstore" --clobber || true
          [ -n "${{ steps.artifacts.outputs.deb }}" ] && \
            gh release upload "${{ inputs.release_tag }}" "${{ steps.artifacts.outputs.deb }}" "${{ steps.artifacts.outputs.deb }}.sigstore" --clobber || true

  # ──────────────────────────────────────────────────────────────────────────────
  publish-release:
    needs: [windows-launcher, macos-launcher, linux-launcher]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish release draft as latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in 1 2 3 4 5; do
            if gh release view "${{ inputs.release_tag }}" -R ${{ github.repository }} --json id >/dev/null 2>&1; then
              gh release edit "${{ inputs.release_tag }}" -R ${{ github.repository }} --draft=false --latest
              echo "Published ${{ inputs.release_tag }}"
              exit 0
            fi
            echo "Release not visible yet (attempt $i/5); sleeping 10s..."
            sleep 10
          done
          echo "::error::Release ${{ inputs.release_tag }} not found after polling"
          exit 1
