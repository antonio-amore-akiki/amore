# Release workflow — Windows/Linux artifacts produced by scripts/release-local.ps1
# on the maintainer host. The macos-build job below produces macOS .tar.gz on
# free GHA macos-latest runners (free for public repos per github billing docs).
# Trigger: gh workflow run release.yml -f version=1.0.0 -f release_tag=v1.0.0

name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      release_tag:
        description: 'Existing release tag (e.g. v1.0.0) — macos-build uploads to this'
        required: true
        default: ''
        type: string

permissions: read-all

jobs:
  notice:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - run: |
          echo "::notice::Win/Linux artifacts for v${{ inputs.version }} are produced via scripts/release-local.ps1. macOS artifacts produced by the macos-build job below. Windows .exe wrapper produced by the windows-build job below."

  windows-build:
    # Wrap the existing v<version> MSI in an Inno Setup .exe (consumer-friendly double-click format).
    # windows-latest free for public repos per https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write
    if: ${{ inputs.release_tag != '' }}
    steps:
      - name: Checkout
        # Use `main` (not the release tag) — the .iss wrapper script was added AFTER v1.0.0;
        # checking out v1.0.0 would 404 on packaging/installer/windows/amore.iss.
        # The MSI source is still pulled from the tag's release page below.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          persist-credentials: false

      - name: Download v${{ inputs.version }} MSI from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ inputs.release_tag }}" -p "amore-windows-x64.msi" -D packaging/installer/windows/ --clobber

      - name: Install Inno Setup (free; ISC-equivalent license)
        run: choco install innosetup --no-progress --confirm

      - name: Compile .iss → .exe
        shell: powershell
        run: |
          cd packaging/installer/windows
          # Chocolatey installs Inno Setup to varying paths across versions; resolve robustly.
          $iscc = Get-ChildItem -Path "C:\Program Files (x86)\Inno Setup*\ISCC.exe", "C:\Program Files\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) {
            # PATH refresh fallback (chocolatey adds Inno to user PATH but workflow shell doesn't see it without refresh).
            Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1" -ErrorAction SilentlyContinue
            refreshenv 2>$null
            $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          }
          if (-not $iscc) { throw "ISCC.exe not found. Tried: C:\Program Files*\Inno Setup*\ISCC.exe and PATH refresh." }
          $isccPath = if ($iscc.PSObject.Properties['Source']) { $iscc.Source } else { $iscc.FullName }
          Write-Host "Using ISCC at: $isccPath"
          & $isccPath /Q amore.iss
          $exePath = "amore-windows-x64.exe"
          if (-not (Test-Path $exePath)) { throw "ISCC did not produce $exePath" }
          $sha = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLower()
          echo "EXE_SHA=$sha" >> $env:GITHUB_ENV
          echo "EXE_PATH=$(Resolve-Path $exePath)" >> $env:GITHUB_ENV

      - name: Upload .exe to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: gh release upload "${{ inputs.release_tag }}" "$env:EXE_PATH" --clobber

      - name: Surface SHA in summary
        shell: powershell
        run: |
          echo "## Windows .exe wrapper complete" >> $env:GITHUB_STEP_SUMMARY
          echo "- **amore-windows-x64.exe SHA256**: ``$env:EXE_SHA``" >> $env:GITHUB_STEP_SUMMARY

  macos-build:
    # macos-latest free for public repos per https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write   # gh release upload requires contents:write at job level (least-privilege per Scorecard Token-Permissions)
    if: ${{ inputs.release_tag != '' }}
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.release_tag }}
          persist-credentials: false

      - name: Install build deps (protoc for tonic-build in amore-mcp)
        run: brew install protobuf

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95 --profile minimal
          rustup default 1.95
          rustup target add ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p amore-cli -p amore-mcp -p amore-gui

      - name: Package tar.gz + SHA256
        id: package
        run: |
          set -euo pipefail
          ARCH_SHORT="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          PKG_DIR="amore-${{ inputs.version }}-macos-${ARCH_SHORT}"
          mkdir -p "${PKG_DIR}"
          cp target/${{ matrix.target }}/release/amore "${PKG_DIR}/"
          cp target/${{ matrix.target }}/release/amore-mcp "${PKG_DIR}/"
          cp target/${{ matrix.target }}/release/amore-gui "${PKG_DIR}/"
          cp LICENSE README.md "${PKG_DIR}/"
          tar -czf "${PKG_DIR}.tar.gz" "${PKG_DIR}"
          SHA="$(shasum -a 256 ${PKG_DIR}.tar.gz | cut -d' ' -f1)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tarball=${PKG_DIR}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build .pkg (unsigned, free pkgbuild — double-clickable installer)
        id: pkg
        run: |
          set -euo pipefail
          ARCH_SHORT="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          PKGROOT="pkgroot-${ARCH_SHORT}"
          mkdir -p "${PKGROOT}/usr/local/bin"
          cp target/${{ matrix.target }}/release/amore "${PKGROOT}/usr/local/bin/"
          cp target/${{ matrix.target }}/release/amore-mcp "${PKGROOT}/usr/local/bin/"
          cp target/${{ matrix.target }}/release/amore-gui "${PKGROOT}/usr/local/bin/"
          PKG_FILE="amore-${{ inputs.version }}-macos-${ARCH_SHORT}.pkg"
          pkgbuild --root "${PKGROOT}" --identifier ai.amore.cli --version ${{ inputs.version }} --install-location / "${PKG_FILE}"
          SHA="$(shasum -a 256 ${PKG_FILE} | cut -d' ' -f1)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "pkg=${PKG_FILE}" >> "$GITHUB_OUTPUT"

      - name: Build .dmg (free hdiutil — drag-to-install disk image)
        id: dmg
        run: |
          set -euo pipefail
          ARCH_SHORT="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          DMG_FILE="amore-${{ inputs.version }}-macos-${ARCH_SHORT}.dmg"
          DMGROOT="dmgroot-${ARCH_SHORT}"
          mkdir -p "${DMGROOT}"
          cp "${{ steps.pkg.outputs.pkg }}" "${DMGROOT}/"
          hdiutil create -volname "Amore ${{ inputs.version }}" -srcfolder "${DMGROOT}" -ov -format UDZO "${DMG_FILE}"
          SHA="$(shasum -a 256 ${DMG_FILE} | cut -d' ' -f1)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "dmg=${DMG_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload tar.gz + .pkg + .dmg to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" "${{ steps.package.outputs.tarball }}" --clobber
          gh release upload "${{ inputs.release_tag }}" "${{ steps.pkg.outputs.pkg }}" --clobber
          gh release upload "${{ inputs.release_tag }}" "${{ steps.dmg.outputs.dmg }}" --clobber

      - name: Surface SHAs in summary
        run: |
          echo "## macOS ${{ matrix.target }} build complete" >> $GITHUB_STEP_SUMMARY
          echo "- **tar.gz SHA256**: \`${{ steps.package.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **.pkg  SHA256**: \`${{ steps.pkg.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY

  linux-build:
    # ubuntu-latest free for public repos. Produces .deb (cargo-deb) +
    # .rpm (cargo-generate-rpm) + .AppImage (linuxdeploy + appimagetool).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: ${{ inputs.release_tag != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          persist-credentials: false

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends protobuf-compiler libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libxdo-dev pkg-config curl file

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95 --profile minimal
          rustup default 1.95

      - name: Install cargo packagers
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build release binaries
        run: cargo build --release -p amore-cli -p amore-mcp -p amore-gui

      - name: Build .deb (cargo-deb)
        id: deb
        run: |
          set -euo pipefail
          cargo deb -p amore-cli --no-build --output target/debian/amore-${{ inputs.version }}-linux-amd64.deb || \
            (cd crates/amore-cli && cargo deb --no-build -o ../../target/debian/amore-${{ inputs.version }}-linux-amd64.deb)
          DEB=$(ls target/debian/amore-${{ inputs.version }}-linux-amd64.deb)
          SHA=$(sha256sum "$DEB" | cut -d' ' -f1)
          echo "deb=$DEB" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Build .rpm (cargo-generate-rpm)
        id: rpm
        run: |
          set -euo pipefail
          cargo generate-rpm -p crates/amore-cli --output target/generate-rpm/amore-${{ inputs.version }}-linux-x86_64.rpm || \
            cargo generate-rpm -p crates/amore-cli -o target/generate-rpm/amore-${{ inputs.version }}-linux-x86_64.rpm
          RPM=$(ls target/generate-rpm/amore-${{ inputs.version }}-linux-x86_64.rpm)
          SHA=$(sha256sum "$RPM" | cut -d' ' -f1)
          echo "rpm=$RPM" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Build .AppImage (linuxdeploy + appimagetool)
        id: appimage
        run: |
          set -euo pipefail
          # Bundle amore-gui as portable AppImage; double-click launches wizard.
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/amore-gui AppDir/usr/bin/
          cp target/release/amore AppDir/usr/bin/ 2>/dev/null || true
          cp target/release/amore-mcp AppDir/usr/bin/ 2>/dev/null || true
          # Minimal desktop entry
          cat > AppDir/usr/share/applications/amore.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Amore
          Exec=amore-gui
          Icon=amore
          Categories=Utility;Development;
          Terminal=false
          DESKTOP
          cp AppDir/usr/share/applications/amore.desktop AppDir/
          # Icon — use packaged icon if present, else 1x1 PNG fallback via base64.
          if [ -f packaging/installer/linux/amore-icon.png ]; then
            cp packaging/installer/linux/amore-icon.png AppDir/usr/share/icons/hicolor/256x256/apps/amore.png
            cp packaging/installer/linux/amore-icon.png AppDir/amore.png
          else
            # Minimal 1x1 transparent PNG (base64) — 67 bytes
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > AppDir/amore.png
            cp AppDir/amore.png AppDir/usr/share/icons/hicolor/256x256/apps/amore.png
          fi
          # AppRun shim
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/amore-gui" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          # Download appimagetool
          curl -sSL -o /tmp/appimagetool 'https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage'
          chmod +x /tmp/appimagetool
          # Run with --appimage-extract-and-run to avoid FUSE
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run AppDir amore-gui-x86_64.AppImage
          SHA=$(sha256sum amore-gui-x86_64.AppImage | cut -d' ' -f1)
          echo "appimage=$(pwd)/amore-gui-x86_64.AppImage" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Upload Linux artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" "${{ steps.deb.outputs.deb }}" --clobber
          gh release upload "${{ inputs.release_tag }}" "${{ steps.rpm.outputs.rpm }}" --clobber
          gh release upload "${{ inputs.release_tag }}" "${{ steps.appimage.outputs.appimage }}" --clobber

      - name: Surface SHAs
        run: |
          echo "## Linux build complete" >> $GITHUB_STEP_SUMMARY
          echo "- **.deb SHA256**: \`${{ steps.deb.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **.rpm SHA256**: \`${{ steps.rpm.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **.AppImage SHA256**: \`${{ steps.appimage.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **.dmg  SHA256**: \`${{ steps.dmg.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY

  crates-publish:
    # Publishes crates to crates.io in dependency order on every tagged release.
    # Requires CARGO_REGISTRY_TOKEN secret — see docs/RELEASING.md §Crates.io secrets.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    if: ${{ inputs.release_tag != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.release_tag }}
          persist-credentials: false

      - name: Install build deps (protoc required by amore-mcp tonic-build)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95 --profile minimal
          rustup default 1.95

      - name: Publish amore-core (base dependency — must publish first)
        run: cargo publish -p amore-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish amore-mcp (depends on amore-core)
        run: cargo publish -p amore-mcp --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish amore-cli (depends on amore-core + adapters)
        run: cargo publish -p amore-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish amore-gui (depends on workspace deps)
        run: cargo publish -p amore-gui --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  docker-publish:
    # Publishes multi-arch Docker image (linux/amd64 + linux/arm64) to Docker Hub.
    # Requires DOCKER_USERNAME + DOCKER_HUB_TOKEN secrets — see docs/RELEASING.md §Docker Hub secrets.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    if: ${{ inputs.release_tag != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.release_tag }}
          persist-credentials: false

      - name: Set up QEMU (cross-arch emulation for arm64)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9764251dc1e58779c # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b04e3dbb4b5b9bef0b6e4e2b9cbbde10c63 # v3.10.0

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile.multiarch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            antonioamoreakiki/amore:latest
            antonioamoreakiki/amore:${{ inputs.release_tag }}
