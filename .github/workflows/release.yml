# release.yml — TAG-TRIGGER NOTICE STUB
#
# The full release pipeline has moved to scripts/release-local.ps1 (local-only).
# Reason: GHA paid minutes exhausted on private repo; user mandate is
#   "only completely unlimited free features". Flipping repo to public is
#   system-prohibited. macOS dropped (no Apple hardware).
#
# This stub fires when a vX.Y.Z tag is pushed, consumes 0 meaningful minutes
# (single ubuntu-latest echo, ~5s), and emits a NOTICE directing maintainers
# to the local pipeline. The workflow is kept so the GHA UI tag-trigger
# muscle memory is preserved.
#
# To ship a release:
#   pwsh ./scripts/release-local.ps1 -Version <X.Y.Z>
#
# See docs/RELEASING.md for the full procedure.

name: release
on:
  push:
    tags: ['v*']
jobs:
  notice:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: |
          echo "::notice::Release artifacts for $GITHUB_REF_NAME are produced via scripts/release-local.ps1 on the maintainer host. See docs/RELEASING.md for the local procedure."
