# Amore Stranger-Install Certification — Phase C2
#
# Matrix: {os: [windows-latest, ubuntu-22.04, macos-latest]} × en-US locale.
# Locale axis (de-DE, ja-JP) lands in Phase G1.
# macOS leg: continue-on-error=true (Apple Dev-ID gap; see ROADMAP.md).
# Aggregate job commits docs/CERTIFICATION.md via [skip ci] when all non-macOS legs PASS.
#
# Prior-art: Adopt — ripgrep .github/workflows/release.yml matrix structure;
# bat .github/workflows/CICD.yml aggregate pattern. Net-new: JSON-Schema validation
# step + aggregate-and-commit job.
#
# Free-tier: all runners are hosted (ubuntu-22.04 / windows-latest / macos-latest),
# free for public repos per https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions

name: certify

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to certify (e.g. v1.0.2). Defaults to latest.'
        required: false
        default: 'latest'
        type: string

# Least-privilege default; jobs that need writes declare their own permissions block.
# Scorecard Token-Permissions hardening (mirrors ci.yml 2026-05-26).
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cert:
    name: cert / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # macOS: continue-on-error — Apple Dev-ID gap means cosign sigstore verify
    # may fail on unsigned .pkg/.dmg. Documented in ROADMAP.md § macOS.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    permissions:
      contents: read
      # id-token: write required for cosign keyless OIDC verify of release artifacts
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout (main — cert scripts live on main, not release tag)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
          persist-credentials: false

      # ── resolve tag ────────────────────────────────────────────────────────
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          if [[ "$INPUT_TAG" == "latest" || -z "$INPUT_TAG" ]]; then
            RESOLVED=$(gh release view --repo antonio-amore-akiki/amore --json tagName --jq '.tagName')
          else
            RESOLVED="$INPUT_TAG"
          fi
          echo "Resolved tag: $RESOLVED"
          echo "tag=$RESOLVED" >> "$GITHUB_OUTPUT"

      # ── install tooling ────────────────────────────────────────────────────
      - name: Install cosign (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # cosign v2 via official installer script (free, Apache-2.0).
          # Pin to v2.4.1 — verified at https://github.com/sigstore/cosign/releases/tag/v2.4.1
          COSIGN_VERSION="v2.4.1"
          OS_LC=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH="amd64"
          BIN_URL="https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-${OS_LC}-${ARCH}"
          curl -sL "$BIN_URL" -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign version

      - name: Install cosign (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $version = "v2.4.1"
          $url = "https://github.com/sigstore/cosign/releases/download/$version/cosign-windows-amd64.exe"
          $dest = "$env:LOCALAPPDATA\cosign\cosign.exe"
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          echo "$env:LOCALAPPDATA\cosign" >> $env:GITHUB_PATH
          & $dest version

      - name: Install Python jsonschema (all OS)
        shell: bash
        run: pip install jsonschema --quiet

      # ── run cert script ────────────────────────────────────────────────────
      - name: Run cert script (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
          CERT_TAG: ${{ steps.tag.outputs.tag }}
        shell: powershell
        run: |
          $certDir = "$env:LOCALAPPDATA\Amore\cert"
          & "${{ github.workspace }}\scripts\certify-user-flow.ps1" `
            -Tag "$env:CERT_TAG" `
            -CertDir "$certDir" `
            -Repo "antonio-amore-akiki/amore" `
            -SchemaDir "${{ github.workspace }}\schema"
          # Normalise output filename: cert-windows-latest.json
          $src = Join-Path $certDir "local-windows-result.json"
          Copy-Item $src "${{ github.workspace }}\cert-windows-latest.json" -Force

      - name: Run cert script (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
          CERT_TAG: ${{ steps.tag.outputs.tag }}
          CERT_REPO: antonio-amore-akiki/amore
        shell: bash
        run: |
          # Derive cert state dir; script uses CERT_DIR for download workspace.
          OS_LC=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          STATE_DIR="$HOME/.amore-cert-state"
          export CERT_DIR="$HOME/.amore-cert-tmp"
          bash "${{ github.workspace }}/scripts/certify-user-flow.sh" \
            --tag "$CERT_TAG" \
            --repo "$CERT_REPO"
          # Normalise output filename for upload: cert-<os>-<runner>.json
          case "${{ matrix.os }}" in
            ubuntu-22.04) LABEL="ubuntu-22.04";;
            macos-latest) LABEL="macos-latest";;
            *) LABEL="${{ matrix.os }}";;
          esac
          cp "$STATE_DIR/local-${OS_LC}-result.json" \
             "${{ github.workspace }}/cert-${LABEL}.json"

      # ── schema validation ─────────────────────────────────────────────────
      - name: Validate cert result against JSON-Schema
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest) LABEL="windows-latest";;
            ubuntu-22.04)   LABEL="ubuntu-22.04";;
            macos-latest)   LABEL="macos-latest";;
          esac
          CERT_FILE="${{ github.workspace }}/cert-${LABEL}.json"
          SCHEMA="${{ github.workspace }}/schema/cert-result.schema.json"
          python3 - "$SCHEMA" "$CERT_FILE" <<'PYEOF'
          import sys, json
          try:
              import jsonschema
              with open(sys.argv[1]) as f: schema = json.load(f)
              with open(sys.argv[2]) as f: doc = json.load(f)
              jsonschema.validate(doc, schema)
              print("Schema valid:", sys.argv[2])
          except ImportError:
              with open(sys.argv[2]) as f: json.load(f)
              print("JSON parse OK (jsonschema not available):", sys.argv[2])
          PYEOF

      # ── upload artifact ────────────────────────────────────────────────────
      - name: Upload cert artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cert-${{ matrix.os }}
          path: cert-${{ matrix.os }}.json
          if-no-files-found: error
          retention-days: 30

  # ── aggregate job ──────────────────────────────────────────────────────────
  aggregate:
    name: aggregate / generate CERTIFICATION.md
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [cert]
    # Run even if macOS leg failed (it's allowed-fail); but only commit if
    # the required legs (Windows + Linux) passed.
    if: always()
    permissions:
      contents: write   # needed for git commit + push of docs/CERTIFICATION.md

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
          persist-credentials: true

      - name: Download all cert artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          pattern: cert-*
          path: cert-artifacts/
          merge-multiple: true

      - name: Generate docs/CERTIFICATION.md
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p docs

          # Parse each cert result file
          parse_result() {
            local file="$1" label="$2"
            if [[ ! -f "$file" ]]; then
              echo "| $label | MISSING | — | $TS |"
              return
            fi
            PASS=$(python3 -c "import json; d=json.load(open('$file')); print('PASS' if d.get('overall_pass') else 'FAIL')")
            TAG=$(python3 -c "import json; d=json.load(open('$file')); print(d.get('release_tag',''))")
            echo "| $label | $PASS | [cert-${label}.json]($RUN_URL) | $TS |"
          }

          WIN_LINE=$(parse_result "cert-artifacts/cert-windows-latest.json" "windows-latest")
          LIN_LINE=$(parse_result "cert-artifacts/cert-ubuntu-22.04.json" "ubuntu-22.04")
          MAC_LINE=$(parse_result "cert-artifacts/cert-macos-latest.json" "macos-latest (allowed-fail)")

          cat > docs/CERTIFICATION.md <<EOF
          # Amore Certification Report

          **Generated:** $TS
          **Release tag:** ${RELEASE_TAG:-latest}
          **Workflow run:** [#${{ github.run_number }}]($RUN_URL)

          > macOS leg is \`continue-on-error: true\` — Apple Dev-ID gap (see ROADMAP.md).
          > A macOS FAIL does not block the Windows/Linux PASS verdict.

          ## Results

          | OS | Status | Cert artifact | Timestamp |
          |---|---|---|---|
          $WIN_LINE
          $LIN_LINE
          $MAC_LINE

          ## Schema

          Cert result files validated against \`schema/cert-result.schema.json\` (JSON-Schema draft-07).

          ## Audit trail

          OSSF Scorecard \`codeApproved\` probe does not see agent-quorum reviews.
          Substantive bar: independent multi-reviewer adversarial review on every commit
          (see \`state/multi-reviewer-quorum.jsonl\`); tool-compatibility gap documented honestly here.
          EOF

          echo "Generated docs/CERTIFICATION.md"
          cat docs/CERTIFICATION.md

      - name: Check if required legs passed (Windows + Linux)
        id: verdict
        shell: bash
        run: |
          WIN_PASS=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('cert-artifacts/cert-windows-latest.json'))
              print('true' if d.get('overall_pass') else 'false')
          except Exception as e:
              print('false')
          ")
          LIN_PASS=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('cert-artifacts/cert-ubuntu-22.04.json'))
              print('true' if d.get('overall_pass') else 'false')
          except Exception as e:
              print('false')
          ")
          echo "win_pass=$WIN_PASS" >> "$GITHUB_OUTPUT"
          echo "lin_pass=$LIN_PASS" >> "$GITHUB_OUTPUT"
          if [[ "$WIN_PASS" == "true" && "$LIN_PASS" == "true" ]]; then
            echo "all_required_pass=true" >> "$GITHUB_OUTPUT"
            echo "Required legs: PASS (Windows=$WIN_PASS Linux=$LIN_PASS)"
          else
            echo "all_required_pass=false" >> "$GITHUB_OUTPUT"
            echo "Required legs: FAIL (Windows=$WIN_PASS Linux=$LIN_PASS)"
          fi

      - name: Commit docs/CERTIFICATION.md [skip ci]
        if: steps.verdict.outputs.all_required_pass == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CERTIFICATION.md
          if git diff --cached --quiet; then
            echo "No changes to docs/CERTIFICATION.md — skipping commit."
          else
            git commit -m "docs: update CERTIFICATION.md for run #${{ github.run_number }} [skip ci]"
            git push origin main
          fi

      - name: Fail aggregate if required legs failed
        if: steps.verdict.outputs.all_required_pass != 'true'
        shell: bash
        run: |
          echo "::error::Required cert legs failed (Windows=${{ steps.verdict.outputs.win_pass }} Linux=${{ steps.verdict.outputs.lin_pass }}). docs/CERTIFICATION.md generated but NOT committed."
          exit 1
