amore:
  replicaCount: 1
  image:
    repository: ghcr.io/antonio-amore-akiki/amore
    tag: "0.5.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 7777
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 2Gi
      cpu: 2000m
  env:
    AMORE_QDRANT_URL: http://amore-qdrant:6333
    AMORE_LOG_LEVEL: info

qdrant:
  enabled: true
  replicaCount: 3
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 8Gi
      cpu: 4000m

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: amore.local
      paths:
        - path: /
          pathType: Prefix
