# cargo-deny configuration for the Amore workspace.
# Invoked nightly by scripts/security-baseline.ps1 and on any manual `cargo deny check`.
# Reference: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Yanked crates are a supply-chain risk — block them.
yanked = "deny"
# Start with empty ignore list; add RUSTSEC IDs only after triage documents acceptance.
ignore = []

[licenses]
# Allow permissive and patent-grant licences. GPL/AGPL/SSPL are denied implicitly
# (they are not in this list). Each licence here was verified present in the workspace
# via `cargo license` at v0.2.1.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "Zlib",
]
exceptions = []
# 0.93 threshold: cargo-deny requires this confidence to accept a detected licence.
confidence-threshold = 0.93

[bans]
# Duplicate versions are allowed but warned — breaking one version per crate is v0.5.0 work.
multiple-versions = "warn"
# Wildcards in version requirements hide upgrades; deny them.
wildcards = "deny"

[sources]
# Only allow the official crates.io registry; deny unknown registries and git sources
# to guard against supply-chain substitution attacks.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
