[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/mcp-server",
    "crates/cli",
    "crates/adapter-claude",
    "crates/adapter-cursor",
    "crates/adapter-codex",
    "crates/adapter-cline",
    "crates/adapter-opencode",
    "crates/adapter-windsurf",
    "crates/adapter-hermes",
]

[workspace.package]
version = "0.2.0"
authors = ["Antonio <antonioakiki15@gmail.com>"]
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/antonio-amore-akiki/obelion"
rust-version = "1.95"

[workspace.dependencies]
# MCP — official Anthropic SDK
rmcp = { version = "1.7", features = ["server", "macros", "transport-io"] }

# Vector store — Qdrant (production scale)
qdrant-client = "1.18"

# LLM + embeddings — Ollama (free unlimited local)
ollama-rs = "0.3"

# Metadata + BM25 — SQLite with bundled FTS5
rusqlite = { version = "0.39", features = ["bundled"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serde
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
thiserror = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Crypto provenance (canonical-JSON + sha256 envelopes)
sha2 = "0.10"
hex = "0.4"
canonical_json = "0.7"

# HTTP client (Ollama, Qdrant fallback)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# CLI argument parsing (subcommands: init / serve / recall / status)
clap = { version = "4", features = ["derive"] }

# Cross-platform user-home / config-dir resolution
dirs = "5"

# TOML — required for Codex CLI adapter (~/.codex/config.toml)
toml = "0.8"

# YAML — required for Hermes Agent adapter (~/.hermes/config.yaml)
serde_yaml = "0.9"

[profile.release]
lto = true
codegen-units = 1
strip = true
opt-level = 3
